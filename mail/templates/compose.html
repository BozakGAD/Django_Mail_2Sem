{% extends 'base.html' %}
{% block title %}Новое письмо{% endblock %}
{% block content %}
<h2>Новое письмо</h2>
<form method="post">
    {% csrf_token %}
    <label>Получатель</label>
    <select name="recipient_id" required>
        {% for user in users %}<option value="{{ user.id }}">{{ user.username }}</option>{% endfor %}
    </select>
    <label>Тема</label>
    <input type="text" name="subject" required>
    <label>Текст</label>
    <textarea name="body" rows="8" required></textarea>
    <button type="submit">Отправить</button>
</form>
{% endblock %}
