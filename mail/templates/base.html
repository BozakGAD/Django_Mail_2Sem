<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Почта{% endblock %}</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
</head>
<body>
<div class="container">
    <div class="nav">
        {% if request.user.is_authenticated %}
            <a href="{% url 'folder-list' 'inbox' %}">Входящие</a>
            <a href="{% url 'folder-list' 'sent' %}">Исходящие</a>
            <a href="{% url 'folder-list' 'archive' %}">Архив</a>
            <a href="{% url 'folder-list' 'trash' %}">Корзина</a>
            <a href="{% url 'compose' %}">Написать</a>
            <a href="/admin/">Админка</a>
            <div class="spacer"></div>
            <span style="color: #e5e7eb;">{{ request.user.username }}</span>
            <form method="post" action="{% url 'logout' %}">{% csrf_token %}<button type="submit">Выйти</button></form>
        {% endif %}
    </div>
    <div class="content">
        {% for message in messages %}
            <div class="msg {{ message.tags }}">{{ message }}</div>
        {% endfor %}
        {% block content %}{% endblock %}
    </div>
</div>
</body>
</html>
